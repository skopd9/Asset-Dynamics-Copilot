kind = "web"
previewPath = "/"
title = "Asset Dynamics – Masoutis Pitch"
version = "1.0.0"
id = "artifacts/asset-dynamics-masoutis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25293

[services.development]
run = "pnpm --filter @workspace/asset-dynamics-masoutis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/asset-dynamics-masoutis", "run", "build" ]
publicDir = "artifacts/asset-dynamics-masoutis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25293"
BASE_PATH = "/"
